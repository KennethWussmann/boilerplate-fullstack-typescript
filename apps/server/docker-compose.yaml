services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: server
      POSTGRES_USER: server
      POSTGRES_PASSWORD: server
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U server']
      interval: 5s
      timeout: 5s
      retries: 5

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:latest
    environment:
      LOG_LEVEL: debug
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRES_DB: server
      POSTGRES_USER: server
      POSTGRES_PASSWORD: server
      API_KEYS: CHANGE-ME-U3BNLL2LWHBxlmmyFtml1XK
      DISABLE_TELEMETRY: "true"
    ports:
      - '3567:3567'