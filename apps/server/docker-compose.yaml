services:
  valkey:
    image: valkey/valkey:latest
    command: valkey-server --port 6379 --requirepass t0lPYFkPhOJ2CfCFYj71y3 
    volumes:
      - valkey_data:/data
    ports:
      - 6379:6379
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: server
      POSTGRES_USER: server
      POSTGRES_PASSWORD: server
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U server']
      interval: 5s
      timeout: 5s
      retries: 5
      
volumes:
  valkey_data: