name: release-docker-develop

on:
  push:
    branches:
      - main

concurrency: release-docker-develop

env:
  FORCE_COLOR: 1

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: [self-hosted, arm64, cb]
            arch: arm64
          - runner: ubuntu-latest
            arch: amd64
    permissions:
      packages: write
      contents: read
    outputs:
      SHORT_SHA: ${{ steps.git-commit.outputs.SHORT_SHA }}
      repository: ${{ steps.repository-lowercase.outputs.repository }}
    steps:
      - uses: actions/checkout@v4
      - name: Get git commit
        id: git-commit
        run: echo "SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-8`" >> "$GITHUB_OUTPUT"
      - name: Lowercase repository name
        id: repository-lowercase
        run: echo "repository=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/docker-publish
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          tags: ghcr.io/${{ steps.repository-lowercase.outputs.repository }}:${{ matrix.arch }}-${{ steps.git-commit.outputs.SHORT_SHA }}
          build-args: VERSION=${{ steps.git-commit.outputs.SHORT_SHA }}

  create-and-push-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Login to GitHub Packages Docker Registry
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - name: Create and push Docker manifest
        run: |
          docker manifest create ghcr.io/${{ needs.build.outputs.REPOSITORY_LC }}:develop \
            --amend ghcr.io/${{ needs.build.outputs.REPOSITORY_LC }}:amd64-${{ needs.build.outputs.SHORT_SHA }} \
            --amend ghcr.io/${{ needs.build.outputs.REPOSITORY_LC }}:arm64-${{ needs.build.outputs.SHORT_SHA }}
          docker manifest push ghcr.io/${{ needs.build.outputs.REPOSITORY_LC }}:develop