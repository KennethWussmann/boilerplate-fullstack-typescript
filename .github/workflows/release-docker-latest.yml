name: release-docker-latest

on:
  push:
    tags:
      - '*'

concurrency: release-docker-latest

env:
  FORCE_COLOR: 1

jobs:
  # Extract version tag once and reuse across all apps
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Get version
        id: vars
        run: echo "tag=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"

  # Build server app
  build-server:
    needs: prepare
    permissions:
      packages: write
      contents: read
    uses: ./.github/workflows/_docker-publish-multiarch.yml
    with:
      app_name: server
      image_suffix: -server
      version_tag: ${{ needs.prepare.outputs.tag }}
      additional_tags: '["latest"]'
    secrets: inherit

  # Add more apps here as needed, for example:
  # build-web:
  #   needs: prepare
  #   permissions:
  #     packages: write
  #     contents: read
  #   uses: ./.github/workflows/_docker-publish-multiarch.yml
  #   with:
  #     app_name: web
  #     image_suffix: -web
  #     version_tag: ${{ needs.prepare.outputs.tag }}
  #     additional_tags: '["latest"]'
  #   secrets: inherit