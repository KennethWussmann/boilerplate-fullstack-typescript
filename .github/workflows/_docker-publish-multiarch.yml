name: _docker-publish-multiarch

on:
  workflow_call:
    inputs:
      context:
        description: 'Build context path'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      version_tag:
        description: 'Version tag (e.g., develop, v1.0.0, commit SHA)'
        required: true
        type: string
      additional_tags:
        description: 'Additional tags to create manifests for (JSON array, e.g., ["latest"])'
        required: false
        type: string
        default: '[]'
      build_args:
        description: 'Additional build arguments'
        required: false
        type: string
        default: ''
    secrets:
      DOCKER_USER:
        description: 'Docker Hub username (optional, for avoiding rate limits)'
        required: false
      DOCKER_PAT:
        description: 'Docker Hub personal access token (optional, for avoiding rate limits)'
        required: false

env:
  FORCE_COLOR: 1
  DO_NOT_TRACK: 1

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: [self-hosted, arm64, cb]
            arch: arm64
          - runner: ubuntu-latest
            arch: amd64
    permissions:
      packages: write
      contents: read
    outputs:
      repository: ${{ steps.repository-lowercase.outputs.repository }}
      version_tag: ${{ inputs.version_tag }}
      additional_tags: ${{ inputs.additional_tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase repository name
        id: repository-lowercase
        run: echo "repository=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/docker-publish
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          tags: ghcr.io/${{ steps.repository-lowercase.outputs.repository }}:${{ matrix.arch }}-${{ inputs.version_tag }}
          build-args: |
            VERSION=${{ inputs.version_tag }}
            ${{ inputs.build_args }}
          context: ${{ inputs.context }}
          dockerfile: ${{ inputs.dockerfile }}
          dockerUser: ${{ secrets.DOCKER_USER }}
          dockerPassword: ${{ secrets.DOCKER_PAT }}

  create-and-push-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_PAT: ${{ secrets.DOCKER_PAT }}
    steps:
      - name: Login to Docker Hub (optional, for pulling public images)
        if: ${{ env.DOCKER_USER != '' && env.DOCKER_PAT != '' }}
        uses: docker/login-action@v3.7.0
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PAT }}

      - name: Login to GitHub Packages Docker Registry
        uses: docker/login-action@v3.7.0
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: Create and push version manifest
        run: |
          docker manifest create ghcr.io/${{ needs.build.outputs.repository }}:${{ needs.build.outputs.version_tag }} \
            --amend ghcr.io/${{ needs.build.outputs.repository }}:amd64-${{ needs.build.outputs.version_tag }} \
            --amend ghcr.io/${{ needs.build.outputs.repository }}:arm64-${{ needs.build.outputs.version_tag }}
          docker manifest push ghcr.io/${{ needs.build.outputs.repository }}:${{ needs.build.outputs.version_tag }}

      - name: Create and push additional manifests
        if: needs.build.outputs.additional_tags != '[]'
        run: |
          TAGS='${{ needs.build.outputs.additional_tags }}'
          echo "$TAGS" | jq -r '.[]' | while read tag; do
            echo "Creating manifest for tag: $tag"
            docker manifest create ghcr.io/${{ needs.build.outputs.repository }}:$tag \
              --amend ghcr.io/${{ needs.build.outputs.repository }}:amd64-${{ needs.build.outputs.version_tag }} \
              --amend ghcr.io/${{ needs.build.outputs.repository }}:arm64-${{ needs.build.outputs.version_tag }}
            docker manifest push ghcr.io/${{ needs.build.outputs.repository }}:$tag
          done
