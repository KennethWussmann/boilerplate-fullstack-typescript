name: docker-publish
description: Publish the Docker image to GH Container Registry
inputs:
  githubToken:
    description: "Token to access private GH Docker registry"
    required: true
  tags:
    description: "Tags to assign for the published docker container"
    required: true
  build-args:
    description: "Build args"
    required: false
  context:
    description: "Build context path"
    required: false
    default: "."
  dockerfile:
    description: "Path to Dockerfile"
    required: false
    default: "./Dockerfile"
  dockerUser:
    description: "Docker Hub username for public registry authentication (optional, to avoid rate limits)"
    required: false
    default: ""
  dockerPassword:
    description: "Docker Hub password/token for public registry authentication (optional, to avoid rate limits)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Login to Docker Hub (optional, for pulling public images)
      if: ${{ inputs.dockerUser != '' && inputs.dockerPassword != '' }}
      uses: docker/login-action@v3.4.0
      with:
        username: ${{ inputs.dockerUser }}
        password: ${{ inputs.dockerPassword }}
    - name: Login to GitHub Packages Docker Registry
      uses: docker/login-action@v3.4.0
      with:
        username: ${{ github.repository_owner }}
        password: ${{ inputs.githubToken }}
        registry: ghcr.io
    - name: Build and push
      uses: docker/build-push-action@v6.18.0
      with:
        push: true
        tags: ${{ inputs.tags }}
        build-args: ${{ inputs.build-args }}
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}